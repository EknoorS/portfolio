<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eknoor | Product Prototyper</title>
    <meta
      name="description"
      content="Product prototyping portfolio featuring advanced CAD work, embedded demos, and experiment write-ups."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script type="module" src="app.js" defer></script>
  </head>
  <body>
    <div class="page-shell">


      <main id="home">


        <section id="projects" class="projects">
          <div class="section-heading">
            <div>
              <h2>Selected Work</h2>
            </div>
            <div class="filters">
              <button class="chip active" data-filter="all">All</button>
              <button class="chip" data-filter="3d">3D</button>
              <button class="chip" data-filter="video">Video</button>
              <button class="chip" data-filter="web">Web</button>
            </div>
          </div>
          <div class="project-grid" data-project-grid></div>
        </section>


      </main>

    </div>
  </body>
</html>
